# AI Test Hub 导航菜单配置
# 新增页面无需修改模板，只需在此添加配置

menus:
  - id: dashboard
    name: 仪表盘
    icon: home
    route: core.dashboard
    order: 1
    
  - id: ai-generator
    name: AI 用例生成
    icon: bolt
    route: core.ai_generator
    order: 2
    
  - id: ui-automation
    name: UI 自动化
    icon: computer-desktop
    route: core.ui_automation
    order: 3
    
  - id: test-runs
    name: 测试执行
    icon: clipboard-document-check
    route: core.test_runs
    order: 4
    
  - id: defects
    name: 缺陷管理
    icon: exclamation-triangle
    route: core.defects
    order: 5
    
  - id: reports
    name: 报告导出
    icon: document-chart-bar
    route: core.reports
    order: 6

# 图标映射（使用 Heroicons SVG）
