{% extends "base.html" %}

{% block title %}缺陷管理 - AI Test Hub{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">缺陷管理</h2>
    <div class="flex gap-2">
        <button onclick="exportDefects()" class="btn btn-ghost btn-sm">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            导出
        </button>
        <button onclick="showCreateDefectModal()" class="btn btn-error btn-sm">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            新建缺陷
        </button>
    </div>
</div>

<!-- 统计卡片 -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    <div class="stats shadow">
        <div class="stat">
            <div class="stat-figure text-error">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <div class="stat-title">总缺陷数</div>
            <div id="statTotalDefects" class="stat-value text-error">0</div>
        </div>
    </div>
    <div class="stats shadow">
        <div class="stat">
            <div class="stat-figure text-warning">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div class="stat-title">打开中</div>
            <div id="statOpenDefects" class="stat-value text-warning">0</div>
        </div>
    </div>
    <div class="stats shadow">
        <div class="stat">
            <div class="stat-figure text-info">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div class="stat-title">已解决</div>
            <div id="statResolvedDefects" class="stat-value text-info">0</div>
        </div>
    </div>
    <div class="stats shadow">
        <div class="stat">
            <div class="stat-figure text-success">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <div class="stat-title">已关闭</div>
            <div id="statClosedDefects" class="stat-value text-success">0</div>
        </div>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- 缺陷列表 -->
    <div class="lg:col-span-2">
        <div class="card bg-white shadow">
            <div class="card-body">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex gap-2">
                        <input type="text" placeholder="搜索缺陷..." class="input input-bordered input-sm" id="searchDefects"/>
                        <select class="select select-bordered select-sm" id="filterSeverity">
                            <option value="">全部严重程度</option>
                            <option value="critical">严重</option>
                            <option value="major">主要</option>
                            <option value="minor">次要</option>
                            <option value="trivial">轻微</option>
                        </select>
                        <select class="select select-bordered select-sm" id="filterStatus">
                            <option value="">全部状态</option>
                            <option value="open">打开</option>
                            <option value="in_progress">处理中</option>
                            <option value="resolved">已解决</option>
                            <option value="closed">已关闭</option>
                        </select>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="table table-zebra">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="selectAllDefects"/></th>
                                <th>ID</th>
                                <th>标题</th>
                                <th>严重程度</th>
                                <th>状态</th>
                                <th>负责人</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="defectsTable"></tbody>
                    </table>
                </div>
                
                <!-- 分页 -->
                <div class="flex justify-center mt-4">
                    <div class="join">
                        <button class="join-item btn btn-sm">«</button>
                        <button class="join-item btn btn-sm btn-active">1</button>
                        <button class="join-item btn btn-sm">2</button>
                        <button class="join-item btn btn-sm">3</button>
                        <button class="join-item btn btn-sm">»</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 缺陷详情面板 -->
    <div>
        <div class="card bg-white shadow sticky top-4">
            <div class="card-body">
                <h3 class="font-bold text-lg mb-4">缺陷详情</h3>
                <div id="defectDetailPanel" class="text-center py-8 text-gray-400">
                    <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <p>选择一个缺陷查看详情</p>
                </div>
                
                <div id="defectDetailContent" class="hidden">
                    <div class="mb-4">
                        <div class="flex justify-between items-start">
                            <h4 class="font-semibold" id="detailTitle"></h4>
                            <span class="badge badge-sm" id="detailSeverity"></span>
                        </div>
                        <div class="mt-2">
                            <span class="badge badge-sm" id="detailStatus"></span>
                            <span class="badge badge-sm ml-2" id="detailAssignee"></span>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <h5 class="font-semibold text-sm mb-2">描述</h5>
                        <p class="text-sm text-gray-600" id="detailDescription"></p>
                    </div>
                    
                    <div class="mb-4">
                        <h5 class="font-semibold text-sm mb-2">关联信息</h5>
                        <div class="text-xs text-gray-500 space-y-1">
                            <div>测试执行：<span id="detailTestRun">-</span></div>
                            <div>测试结果：<span id="detailTestResult">-</span></div>
                            <div>创建时间：<span id="detailCreatedAt"></span></div>
                            <div>更新时间：<span id="detailUpdatedAt"></span></div>
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <button onclick="editDefect()" class="btn btn-sm btn-outline">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                            编辑
                        </button>
                        <button onclick="analyzeDefectWithAI()" class="btn btn-sm btn-primary">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                            AI 分析
                        </button>
                        <button onclick="deleteDefect()" class="btn btn-sm btn-ghost text-error">删除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 创建缺陷模态框 -->
<dialog id="createDefectModal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4">创建缺陷</h3>
        <div class="form-control mb-4">
            <label class="label">
                <span class="label-text">缺陷标题 *</span>
            </label>
            <input type="text" id="newDefectTitle" class="input input-bordered" required/>
        </div>
        <div class="form-control mb-4">
            <label class="label">
                <span class="label-text">描述</span>
            </label>
            <textarea id="newDefectDesc" class="textarea textarea-bordered h-24"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="form-control">
                <label class="label">
                    <span class="label-text">严重程度</span>
                </label>
                <select id="newDefectSeverity" class="select select-bordered">
                    <option value="critical">严重</option>
                    <option value="major">主要</option>
                    <option value="minor">次要</option>
                    <option value="trivial">轻微</option>
                </select>
            </div>
            <div class="form-control">
                <label class="label">
                    <span class="label-text">负责人</span>
                </label>
                <input type="text" id="newDefectAssignee" class="input input-bordered"/>
            </div>
        </div>
        <div class="form-control mb-4">
            <label class="label">
                <span class="label-text">关联测试执行</span>
            </label>
            <select id="newDefectTestRun" class="select select-bordered">
                <option value="">无</option>
            </select>
        </div>
        <div class="modal-action">
            <button onclick="closeCreateDefectModal()" class="btn">取消</button>
            <button onclick="submitCreateDefect()" class="btn btn-error">创建</button>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>关闭</button>
    </form>
</dialog>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/defects.js') }}"></script>
{% endblock %}
